<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Muskan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="birthdayMusic" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<div id="page1" class="glass">

<h1>🎂 Happy Birthday Musarkan 😝🎈</h1>

<div class="photo-slot">
<img src="image/muskan4.jpg.jpg" alt="Muskan's Photo">
</div>

<div class="gift-box" onclick="openGift()">
🎁
<p>Open Gift</p>
</div>

<button id="musicBtn">🎵 Play Birthday Music</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="glass">

<h1>💖 Surprise for Muskan 💖</h1>

<p class="message">
<span id="typing"></span>
</p>

<!-- 3D CAKE -->

<div class="cake-container">

<div class="cake">

<div class="plate"></div>

<div class="layer layer-bottom"></div>
<div class="layer layer-middle"></div>
<div class="layer layer-top"></div>

<div class="icing"></div>

<div class="drip drip1"></div>
<div class="drip drip2"></div>
<div class="drip drip3"></div>

<div class="candle">
<div class="flame" id="flame"></div>
</div>

</div>

</div>

<button id="blowBtn">💨 Blow Candle</button>

<div class="gallery">

<img src="image/muskan1.jpg.jpg" alt="Muskan's Photo">
<img src="image/muskan2.jpg.jpg" alt="Muskan's Photo">
<img src="image/muskan3.jpg.jpg" alt="Muskan's Photo">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
